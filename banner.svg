<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 300" width="1400" height="300">
<defs>
<style>
  @keyframes fadeNode {
    from { opacity:0; transform:scale(0); }
    to   { opacity:1; transform:scale(1); }
  }
  @keyframes drawPath {
    to { stroke-dashoffset:0; }
  }
  @keyframes ringPulse {
    0%,100% { r:15; opacity:.1; }
    50%     { r:22; opacity:.32; }
  }
  @keyframes destPulse {
    0%,100% { r:8;  opacity:1;   }
    50%     { r:12; opacity:.75; }
  }
  @keyframes titleIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0);    }
  }
  @keyframes subIn {
    from { opacity:0; }
    to   { opacity:1; }
  }
  @keyframes lineIn {
    from { opacity:0; stroke-dashoffset:200; }
    to   { opacity:.45; stroke-dashoffset:0; }
  }

  .nd {
    animation: fadeNode .35s ease-out both;
    transform-box: fill-box;
    transform-origin: center;
  }
  .n1  { animation-delay:.05s } .n2  { animation-delay:.10s }
  .n3  { animation-delay:.15s } .n4  { animation-delay:.20s }
  .n5  { animation-delay:.25s } .n6  { animation-delay:.28s }
  .n7  { animation-delay:.32s } .n8  { animation-delay:.37s }
  .n9  { animation-delay:.42s } .n10 { animation-delay:.46s }
  .n11 { animation-delay:.50s } .n12 { animation-delay:.55s }
  .n13 { animation-delay:.60s } .n14 { animation-delay:.63s }
  .n15 { animation-delay:.67s } .n16 { animation-delay:.72s }
  .n17 { animation-delay:.77s } .n18 { animation-delay:.82s }
  .n19 { animation-delay:.87s } .n20 { animation-delay:.90s }
  .n21 { animation-delay:.95s } .n22 { animation-delay:1.00s }
  .n23 { animation-delay:1.05s } .n24 { animation-delay:1.10s }

  .title  { animation: titleIn .85s cubic-bezier(.16,1,.3,1) 2.1s both; }
  .sub    { animation: subIn   .7s ease-out 2.55s both; }
  .deco   { stroke-dasharray:200; animation: lineIn .7s ease-out 2.35s both; }
  .ring   { animation: ringPulse 2.6s ease-in-out 3.2s infinite; }
  .dest   { animation: destPulse 2s   ease-in-out 3.2s infinite;
            transform-box:fill-box; transform-origin:center; }
</style>

<radialGradient id="bg" cx="50%" cy="45%">
  <stop offset="0%"   stop-color="#0D1B36"/>
  <stop offset="100%" stop-color="#060C18"/>
</radialGradient>

<filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
  <feGaussianBlur stdDeviation="5" result="b"/>
  <feComposite in="SourceGraphic" in2="b" operator="over"/>
</filter>
<filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
  <feGaussianBlur stdDeviation="2.5" result="b"/>
  <feComposite in="SourceGraphic" in2="b" operator="over"/>
</filter>
</defs>

<!-- Background -->
<rect width="1400" height="300" fill="url(#bg)"/>

<!-- Subtle grid lines -->
<g stroke="#0C1829" stroke-width="1">
  <line x1="0" y1="75"  x2="1400" y2="75"/>
  <line x1="0" y1="150" x2="1400" y2="150"/>
  <line x1="0" y1="225" x2="1400" y2="225"/>
  <line x1="350"  y1="0" x2="350"  y2="300"/>
  <line x1="700"  y1="0" x2="700"  y2="300"/>
  <line x1="1050" y1="0" x2="1050" y2="300"/>
</g>

<!-- ── Background edges (off-path connections) ── -->
<g stroke="#132240" stroke-width="1.3" fill="none" opacity="0.8">
  <!-- Left cluster -->
  <line x1="52"  y1="148" x2="118" y2="62"/>
  <line x1="52"  y1="148" x2="142" y2="238"/>
  <line x1="118" y1="62"  x2="238" y2="110"/>
  <line x1="142" y1="238" x2="238" y2="110"/>
  <line x1="142" y1="238" x2="332" y2="252"/>
  <line x1="238" y1="110" x2="298" y2="46"/>
  <line x1="238" y1="110" x2="418" y2="148"/>
  <line x1="298" y1="46"  x2="498" y2="70"/>
  <line x1="332" y1="252" x2="464" y2="256"/>
  <line x1="418" y1="148" x2="498" y2="70"/>
  <line x1="418" y1="148" x2="464" y2="256"/>
  <line x1="418" y1="148" x2="560" y2="164"/>
  <line x1="498" y1="70"  x2="560" y2="164"/>
  <line x1="464" y1="256" x2="560" y2="164"/>
  <line x1="560" y1="164" x2="608" y2="74"/>
  <line x1="560" y1="164" x2="620" y2="248"/>
  <line x1="608" y1="74"  x2="620" y2="248"/>
  <!-- Bridge (sparse center) -->
  <line x1="620" y1="248" x2="808" y2="246"/>
  <!-- Right cluster -->
  <line x1="824" y1="68"  x2="808" y2="246"/>
  <line x1="824" y1="68"  x2="850" y2="150"/>
  <line x1="808" y1="246" x2="850" y2="150"/>
  <line x1="850" y1="150" x2="930" y2="64"/>
  <line x1="850" y1="150" x2="944" y2="258"/>
  <line x1="930" y1="64"  x2="1014" y2="148"/>
  <line x1="944" y1="258" x2="1014" y2="148"/>
  <line x1="944" y1="258" x2="1082" y2="250"/>
  <line x1="1014" y1="148" x2="1100" y2="70"/>
  <line x1="1014" y1="148" x2="1176" y2="148"/>
  <line x1="1100" y1="70"  x2="1176" y2="148"/>
  <line x1="1082" y1="250" x2="1176" y2="148"/>
  <line x1="1176" y1="148" x2="1254" y2="64"/>
  <line x1="1176" y1="148" x2="1268" y2="252"/>
  <line x1="1254" y1="64"  x2="1370" y2="148"/>
  <line x1="1268" y1="252" x2="1370" y2="148"/>
</g>

<!-- ── Agent path (animated draw, highlighted blue) ── -->
<polyline
  points="52,148 238,110 418,148 560,164 608,74 824,68 850,150 1014,148 1176,148 1370,148"
  stroke="#1D4ED8" stroke-width="2.2" fill="none"
  stroke-linecap="round" stroke-linejoin="round"
  stroke-dasharray="1650" stroke-dashoffset="1650"
  style="animation:drawPath 2.4s cubic-bezier(.4,0,.2,1) 0.7s forwards"/>
<!-- Brighter overlay on top for path glow -->
<polyline
  points="52,148 238,110 418,148 560,164 608,74 824,68 850,150 1014,148 1176,148 1370,148"
  stroke="#3B82F6" stroke-width="1" fill="none"
  stroke-linecap="round" stroke-linejoin="round"
  opacity="0.5"
  stroke-dasharray="1650" stroke-dashoffset="1650"
  style="animation:drawPath 2.4s cubic-bezier(.4,0,.2,1) 0.7s forwards"/>

<!-- ── Off-path nodes (dim) ── -->
<g fill="#0E2040" stroke="#1A3F6F" stroke-width="1.4">
  <circle cx="118"  cy="62"  r="4"   class="nd n2"/>
  <circle cx="142"  cy="238" r="3.5" class="nd n3"/>
  <circle cx="298"  cy="46"  r="3.5" class="nd n5"/>
  <circle cx="332"  cy="252" r="3.5" class="nd n6"/>
  <circle cx="498"  cy="70"  r="3.5" class="nd n8"/>
  <circle cx="464"  cy="256" r="3.5" class="nd n9"/>
  <circle cx="620"  cy="248" r="3.5" class="nd n12"/>
  <circle cx="808"  cy="246" r="3.5" class="nd n14"/>
  <circle cx="930"  cy="64"  r="3.5" class="nd n16"/>
  <circle cx="944"  cy="258" r="3.5" class="nd n17"/>
  <circle cx="1100" cy="70"  r="3.5" class="nd n19"/>
  <circle cx="1082" cy="250" r="3.5" class="nd n20"/>
  <circle cx="1254" cy="64"  r="3.5" class="nd n22"/>
  <circle cx="1268" cy="252" r="3.5" class="nd n23"/>
</g>

<!-- ── On-path nodes (lit, blue) ── -->
<g fill="#1A3F8F" stroke="#3B82F6" stroke-width="2">
  <circle cx="52"   cy="148" r="5.5" class="nd n1"  filter="url(#softglow)"/>
  <circle cx="238"  cy="110" r="6"   class="nd n4"  filter="url(#softglow)"/>
  <circle cx="418"  cy="148" r="6"   class="nd n7"  filter="url(#softglow)"/>
  <circle cx="560"  cy="164" r="5.5" class="nd n10" filter="url(#softglow)"/>
  <circle cx="608"  cy="74"  r="5.5" class="nd n11" filter="url(#softglow)"/>
  <circle cx="824"  cy="68"  r="5.5" class="nd n13" filter="url(#softglow)"/>
  <circle cx="850"  cy="150" r="6"   class="nd n15" filter="url(#softglow)"/>
  <circle cx="1014" cy="148" r="6"   class="nd n18" filter="url(#softglow)"/>
  <circle cx="1176" cy="148" r="6"   class="nd n21" filter="url(#softglow)"/>
</g>

<!-- ── Destination node (pulsing) ── -->
<circle cx="1370" cy="148" r="22" class="ring"
  fill="none" stroke="#3B82F6" stroke-width="1.2"/>
<circle cx="1370" cy="148" r="8" class="nd dest n24"
  fill="#2563EB" stroke="#60A5FA" stroke-width="2.5"
  filter="url(#glow)"/>

<!-- ── Text: decorative side rules ── -->
<line x1="188" y1="148" x2="375" y2="148"
  stroke="#3B82F6" stroke-width="1" class="deco"/>
<line x1="1045" y1="148" x2="1232" y2="148"
  stroke="#3B82F6" stroke-width="1" class="deco"/>

<!-- ── Text: Name ── -->
<text class="title"
  x="710" y="148"
  font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
  font-size="56" font-weight="700"
  fill="#E6EDF3"
  text-anchor="middle" dominant-baseline="middle"
  letter-spacing="-1.5">Rayyan Merchant</text>

<!-- ── Text: Subtitle ── -->
<text class="sub"
  x="710" y="194"
  font-family="'SF Mono','Fira Code','Fira Mono','Roboto Mono',monospace"
  font-size="12.5" fill="#58A6FF"
  text-anchor="middle"
  letter-spacing="3">AI/ML ENGINEER  ·  RESEARCHER IN TRAINING  ·  FAST NUCES KARACHI</text>

</svg>
